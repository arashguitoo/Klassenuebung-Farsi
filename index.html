function launch(mode){
  var b64 = mode==='lehrer' ? LEHRER_B64 : SCHUELER_B64;
  var src = 'data:text/html;base64,' + b64;
  var frame = document.getElementById('app-frame');
  frame.src = src;
  frame.style.display = 'block';
  document.getElementById('router').style.display = 'none';
  history.replaceState(null,'','?mode='+mode);
}

// Auto-launch from URL param
(function(){
  var p = new URLSearchParams(location.search).get('mode');
  if(p==='lehrer'||p==='schueler') launch(p);
})();
</script>
