});
var FDB = firebase.database();

// ── Router ──
function startMode(mode) {
  document.getElementById('router').classList.add('hide');
  if (mode === 'lehrer') {
    loadLehrer();
  } else {
    loadSchueler();
  }
  history.replaceState(null, '', '?mode=' + mode);
}

document.getElementById('btn-lehrer').onclick = function(){ startMode('lehrer'); };
document.getElementById('btn-schueler').onclick = function(){ startMode('schueler'); };

// Auto from URL
(function(){
  var p = new URLSearchParams(location.search).get('mode');
  if (p === 'lehrer' || p === 'schueler') {
    // Wait for DOM
    document.addEventListener('DOMContentLoaded', function(){ startMode(p); });
    if (document.readyState !== 'loading') startMode(p);
  }
})();

function Lref(p){ return FDB.ref('pruefung/' + L_SESSION + '/' + p); }

function loadLehrer() {
  L_SESSION = 'live_' + (function(){var d=new Date();return d.getFullYear()+''+('0'+(d.getMonth()+1)).slice(-2)+''+('0'+d.getDate()).slice(-2)+'_'+('0'+d.getHours()).slice(-2);})();
  var wrap = document.getElementById('lehrer-wrap');
  wrap.classList.remove('hide');
  wrap.innerHTML = L_buildHTML();
  L_initListeners();
  // Tooltip
  document.addEventListener('mouseover', function(e){
    var w = e.target.closest ? e.target.closest('[data-tr]') : null;
    if (!w) return;
    var t = document.getElementById('L-tt');
    if (!t) return;
    t.textContent = w.getAttribute('data-tr');
    t.style.display = 'block';
  });
  document.addEventListener('mousemove', function(e){
    var t = document.getElementById('L-tt'); if(!t||t.style.display==='none')return;
    t.style.left=(e.clientX+12)+'px'; t.style.top=(e.clientY-32)+'px';
  });
  document.addEventListener('mouseout', function(e){
    if(!e.target.getAttribute || !e.target.getAttribute('data-tr')){
      var t=document.getElementById('L-tt'); if(t) t.style.display='none';
    }
  });
}

function L_phase(n){
  document.querySelectorAll('.L-pp').forEach(p=>p.classList.remove('active'));
  document.getElementById('L-p'+n).classList.add('active');
  document.querySelectorAll('#L-nav .L-pb').forEach((b,i)=>{
    b.classList.remove('active','done');
    if(i===n) b.classList.add('active');
    else if(i<n) b.classList.add('done');
  });
  if(n===9) L_loadScores();
}
function L_toggleTimer(){
  if(L_timerRunning){clearInterval(L_timerInt);L_timerRunning=false;document.getElementById('L-tbtn').textContent='▶ Start';}
  else{L_timerInt=setInterval(function(){
    if(L_timerSec<=0){clearInterval(L_timerInt);return;}
    L_timerSec--;
    var m=Math.floor(L_timerSec/60),s=L_timerSec%60;
    document.getElementById('L-timer').textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
    if(L_timerSec===0) document.getElementById('L-timer').style.color='#F43F5E';
  },1000);L_timerRunning=true;document.getElementById('L-tbtn').textContent='⏸ Pause';}
}
function L_startTask(id){ Lref('task').set({id:id,active:true,ts:Date.now()}); }
function L_reveal(what){ Lref('reveal/'+what).set(true); }
function L_revealBlanks(){
  ['Lb0','Lb1','Lb2','Lb3'].forEach(function(id){
    var el=document.getElementById(id);

function L_showDialogAnswer(){
  ['Ld0','Ld1','Ld2','Ld3','Ld4'].forEach(function(id){

function L_updateResults(taskId, answers){
  var task=L_TASKS[taskId];if(!task)return;
  var resultEl=document.getElementById('L-r-'+taskId);
  var liveEl=document.getElementById('L-live-'+taskId);
  if(!resultEl)return;
  var students=Object.keys(answers);
  var html='',totalC=0,totalA=0;
  task.questions.forEach(function(q,qi){
    if(q.type==='free')return;
    var counts=new Array(q.opts.length).fill(0),tot=0;
    students.forEach(function(s){var a=answers[s];if(a&&a['q'+qi]!==undefined){counts[a['q'+qi]]++;tot++;}});
    html+='<div style="margin-bottom:.75rem"><div style="font-size:.79rem;font-weight:700;margin-bottom:.3rem">'+(qi+1)+'. '+q.q+'</div>';
    q.opts.forEach(function(o,oi){
      var pct=tot>0?Math.round(counts[oi]/tot*100):0;
      var bc=oi===q.ans?'#22C55E':'#0D9488';
      html+='<div style="display:flex;align-items:center;gap:7px;margin-bottom:4px">';
      html+='<div style="'+(q.fa?'font-family:Vazirmatn,sans-serif;direction:rtl;':'')+'min-width:130px;font-size:.8rem">'+o+'</div>';
      html+='<div style="flex:1;background:#273548;border-radius:5px;overflow:hidden;height:21px">';
      html+='<div style="height:100%;background:'+bc+';width:'+pct+'%;transition:width .5s;display:flex;align-items:center;padding:0 5px;font-size:.7rem;font-weight:800;color:white">'+(pct>0?pct+'%':'')+'</div></div>';
      html+='<div style="font-size:.73rem;color:#94A3B8;min-width:20px">'+counts[oi]+'</div></div>';
    });
    html+='</div>';
    students.forEach(function(s){var a=answers[s];if(a&&a['q'+qi]!==undefined){totalA++;if(a['q'+qi]===q.ans)totalC++;}});
  });
  resultEl.innerHTML=html||'<div style="color:#64748B;font-size:.82rem;text-align:center;padding:1.5rem">Warte...</div>';
  var nA=students.filter(s=>answers[s]).length;
  var aEl=document.getElementById('L-t1-a')||document.getElementById('L-t3-a');
  var cEl=document.getElementById('L-t1-c')||document.getElementById('L-t3-c');
  if(taskId==='t1mc'){if(document.getElementById('L-t1-a'))document.getElementById('L-t1-a').textContent=nA;if(document.getElementById('L-t1-c'))document.getElementById('L-t1-c').textContent=totalC;}
  // Free answers
  if(liveEl){
    var fh=students.map(function(s){var a=answers[s];return a&&a.free?'<div class="L-ai"><span class="L-an">'+s+'</span><span class="L-at">'+a.free+'</span></div>':''}).join('');
    liveEl.innerHTML=fh||'<div style="color:#64748B;font-size:.82rem">Keine freien Antworten</div>';
  }
}
function L_updateLueck(ans){
  var el=document.getElementById('L-live-t2lc');if(!el)return;
  var A=['ارزان‌تر','بزرگ‌ترین','بازار','خوشحال'];
  var h=Object.keys(ans).map(function(n){var a=ans[n];var c=Object.keys(a).filter(k=>a[k]===A[+k]).length;return'<div class="L-ai"><span class="L-an">'+n+'</span><span style="color:#22C55E;font-weight:700">'+c+'/4</span></div>';}).join('');
  el.innerHTML=h||'<div style="color:#64748B;font-size:.82rem">Warte...</div>';
}
function L_updateDialog(ans){
  var el=document.getElementById('L-live-dialog');if(!el)return;
  var h=Object.keys(ans).map(function(n){var a=ans[n];var c=Object.keys(a).filter(k=>+a[k]===+k).length;return'<div class="L-ai"><span class="L-an">'+n+'</span><span style="color:#22C55E;font-weight:700">'+c+'/5</span></div>';}).join('');
  el.innerHTML=h||'<div style="color:#64748B;font-size:.82rem">Warte...</div>';
}
function L_updatePaar(ans){
  var el=document.getElementById('L-live-paar');if(!el)return;
  var h=Object.keys(ans).map(function(n){var a=ans[n];return'<div class="L-ai"><span class="L-an">'+n+'</span><span style="color:#22C55E;font-weight:700">'+(a.score||0)+'/'+(a.total||L_PAAR.length)+'</span></div>';}).join('');
  el.innerHTML=h||'<div style="color:#64748B;font-size:.82rem">Warte...</div>';
}
function L_loadScores(){
  Lref('scores').once('value').then(function(snap){
    var s=snap.val()||{};
    var el=document.getElementById('L-scores');if(!el)return;
    var sorted=Object.keys(s).sort((a,b)=>(s[b].total||0)-(s[a].total||0));
    if(!sorted.length){el.innerHTML='<div style="color:#64748B;font-size:.82rem;grid-column:1/-1;text-align:center;padding:1.5rem">Noch keine Daten</div>';return;}
    var md=['🥇','🥈','🥉'];
    el.innerHTML=sorted.map((n,i)=>'<div class="L-sc-card"><div class="L-sc-n">'+(md[i]||'')+(i+1)+'. '+n+'</div><div class="L-sc-v">'+(s[n].total||0)+'</div></div>').join('');
  });
}
function L_exportCSV(){
  Lref('scores').once('value').then(function(snap){
    var d=snap.val()||{};
    var csv='Name,Punkte\n'+Object.keys(d).sort((a,b)=>(d[b].total||0)-(d[a].total||0)).map(n=>n+','+(d[n].total||0)).join('\n');
    var a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='ergebnisse.csv';a.click();
  });
}
function L_reset(){
  if(!confirm('Neue Runde starten?'))return;
  Lref('').remove();L_timerSec=5400;clearInterval(L_timerInt);L_timerRunning=false;
  document.getElementById('L-timer').textContent='90:00';
  document.getElementById('L-timer').style.color='#F59E0B';
  document.getElementById('L-tbtn').textContent='▶ Start';
  L_phase(0);
}

      <div class="S-wbank" id="S-wb">

var S_TASKS = {
  t1mc:{title:'Aufgaben — Text 1',questions:[
    {q:'Wie fährt Danial zur Uni?',opts:['با ماشین','با اتوبوس','با مترو','پیاده'],ans:1,fa:true},
    {q:'Was macht er in der Bibliothek?',opts:['موسیقی گوش می‌دهد','صحبت می‌کند','درس می‌خواند','کتاب می‌خرد'],ans:2,fa:true},
    {q:'Richtig/Falsch: Danial spielt abends Fußball.',opts:['Richtig ✓','Falsch ✗'],ans:1,fa:false},
    {q:'Richtig/Falsch: Danial liebt Sport.',opts:['Richtig ✓','Falsch ✗'],ans:0,fa:false},
    {q:'Was denkt Danial über sein Leben?',opts:['Schwer','Einfach aber angenehm','Langweilig','Perfekt'],ans:1,fa:false},
  ]},
  t3q:{title:'Aufgaben — Text 3',questions:[
    {q:'Wohin will Niloufar?',opts:['به فرانسه','به انگلستان','به آلمان','به ایتالیا'],ans:2,fa:true},
    {q:'Richtig/Falsch: Niloufar reist mit Freunden.',opts:['Richtig ✓','Falsch ✗'],ans:1,fa:false},
    {q:'Was will Niloufar danach?',opts:['In DE bleiben','Nach Iran zurück','Andere Länder','Promovieren'],ans:1,fa:false},
    {q:'Freie Antwort: Was würden Sie an Nilofars Stelle tun? (auf Persisch)',type:'free'},
  ]},
};
var S_DIALOG_B=['گیشه شماره سه، سمت چپ.','ساعت ده و نیم.','بله، چند تا جای خالی مانده.','صد و پنجاه هزار تومان.','خواهش می‌کنم. سفر خوشی داشته باشید!'];
var S_DIALOG_A=['ببخشید، بلیط تهران کجا می‌فروشند؟','قطار ساعت چند حرکت می‌کند؟','آیا جای نشستن پیدا می‌شود؟','قیمت بلیط چقدر است؟','ممنون از کمکتان.'];
var S_DIALOG_COR=[0,1,2,3,4];
var S_PAAR=[{fa:'رفتن',de:'gehen'},{fa:'بودن',de:'sein'},{fa:'داشتن',de:'haben'},{fa:'خوردن',de:'essen'},{fa:'دیدن',de:'sehen'},{fa:'بهترین',de:'das Beste'},{fa:'خسته',de:'müde'},{fa:'بازار',de:'Markt'}];

function S_scr(id){document.querySelectorAll('.S-scr').forEach(s=>s.classList.remove('on'));document.getElementById('S-'+id).classList.add('on');}
function S_addPts(n){S_pts+=n;document.getElementById('S-pts-disp').textContent=S_pts+' Pkt';Sref('scores/'+S_name).set({total:S_pts});}
function S_join(){
  var urlSess = new URLSearchParams(location.search).get('session');
  var sess = urlSess || document.getElementById('S-inp-sess').value.trim();
  var name=document.getElementById('S-inp-name').value.trim();
  if(!sess||!name){alert('Bitte Session-Code und Name eingeben.');return;}
  S_sess=sess;S_name=name;
  // pre-fill session from URL
  var _urlSess = new URLSearchParams(location.search).get('session');
  if(_urlSess) { var si = document.getElementById('S-inp-sess'); if(si) si.value = _urlSess; }
  document.getElementById('S-join').style.display='none';
  document.getElementById('S-main').style.display='block';
  document.getElementById('S-uname').textContent=name;
  var pr=Sref('students/'+name);pr.set({online:true,joined:Date.now()});pr.onDisconnect().set({online:false});
  Sref('task').on('value',function(snap){
    var t=snap.val();if(!t||!t.active||t.id===S_lastTask)return;
    S_lastTask=t.id;
    if(t.id==='t1mc')S_buildMC('t1mc');
    else if(t.id==='t2lc')S_scr('lueck');
    else if(t.id==='t2dialog')S_buildDialog();
    else if(t.id==='t3q')S_buildMC('t3q');
    else if(t.id==='paar')S_buildPaar();
  });
  Sref('reveal').on('value',function(snap){
    var r=snap.val()||{};
    if(r.t2lc)S_revealBlanks();
    if(r.dialog)S_revealDialog();
    if(r.paar)S_revealPaar();
  });
  S_scr('wait');
}
function S_buildMC(tid){
  var task=S_TASKS[tid];if(!task)return;
  S_mcAns={};
  document.getElementById('S-mc-ttl').textContent=task.title;
  var html='';
  task.questions.forEach(function(q,qi){
    html+='<div class="S-qc"><div class="S-qt">'+(qi+1)+'. '+q.q+'</div>';
    if(q.type==='free'){html+='<textarea class="S-fin-in" id="S-free-'+tid+'-'+qi+'" placeholder="Persisch..."></textarea>';}
    else{
      html+='<div class="S-opts">';
      q.opts.forEach(function(o,oi){html+='<div class="S-opt'+(q.fa?' fa':'')+'" id="S-o-'+tid+'-'+qi+'-'+oi+'" onclick="S_selOpt(\''+tid+'\','+qi+','+oi+')">'+o+'</div>';});
      html+='</div>';
    }
    html+='</div>';
  });
  document.getElementById('S-mc-body').innerHTML=html;
  var btn=document.getElementById('S-mc-btn');
  btn.dataset.tid=tid;btn.disabled=false;
  S_scr('mc');
}
function S_selOpt(tid,qi,oi){
  var q=S_TASKS[tid].questions[qi];
  q.opts.forEach(function(_,i){var el=document.getElementById('S-o-'+tid+'-'+qi+'-'+i);if(el)el.classList.remove('sel');});
  var el=document.getElementById('S-o-'+tid+'-'+qi+'-'+oi);if(el)el.classList.add('sel');
  S_mcAns['q'+qi]=oi;
}
function S_submitMC(){
  var tid=document.getElementById('S-mc-btn').dataset.tid||'t1mc';
  var task=S_TASKS[tid];
  task.questions.forEach(function(q,qi){if(q.type==='free'){var el=document.getElementById('S-free-'+tid+'-'+qi);if(el)S_mcAns.free=el.value;}});
  Sref('answers/'+tid+'/'+S_name).set(S_mcAns);
  var cor=0;
  task.questions.forEach(function(q,qi){
    if(q.type==='free')return;
    var ans=S_mcAns['q'+qi];if(ans===undefined)return;
    var cel=document.getElementById('S-o-'+tid+'-'+qi+'-'+q.ans);
    var sel=document.getElementById('S-o-'+tid+'-'+qi+'-'+ans);
    if(cel)cel.classList.add('ok','dis');if(sel&&ans!==q.ans)sel.classList.add('no');
    if(ans===q.ans)cor++;
  });
  document.getElementById('S-mc-btn').disabled=true;
  S_addPts(cor*2);S_scr('wait');
}
function S_selWord(el){document.querySelectorAll('.S-ww').forEach(w=>w.classList.remove('sw'));S_lueckSel=el.dataset.w;el.classList.add('sw');}
function S_fillBlank(i){
  if(!S_lueckSel)return;
  var s=document.getElementById('Sbs'+i);if(s.classList.contains('fi'))return;
  s.textContent=S_lueckSel;s.classList.add('fi');S_lueckFilled[i]=S_lueckSel;
  document.querySelectorAll('.S-ww').forEach(function(w){if(w.dataset.w===S_lueckSel)w.classList.add('used');});
  S_lueckSel=null;document.querySelectorAll('.S-ww').forEach(w=>w.classList.remove('sw'));
  if(Object.keys(S_lueckFilled).length>=4)document.getElementById('S-lb').disabled=false;
}
function S_submitLueck(){
  Sref('answers/t2lc/'+S_name).set(S_lueckFilled);
  var A=['ارزان‌تر','بزرگ‌ترین','بازار','خوشحال'],cor=0;
  for(var i=0;i<4;i++){var s=document.getElementById('Sbs'+i);if(!s)continue;if(S_lueckFilled[i]===A[i]){s.classList.add('ok');cor++;}else s.classList.add('no');}
  document.getElementById('S-lb').disabled=true;S_addPts(cor*2);S_scr('wait');
}
function S_revealBlanks(){for(var i=0;i<4;i++){var s=document.getElementById('Sbs'+i);if(s&&!s.classList.contains('fi')){s.textContent=s.dataset.a;s.classList.add('fi');}}}
function S_buildDialog(){
  S_dialogAns={};
  var html='';
  S_DIALOG_A.forEach(function(a,i){
    html+='<div class="S-da"><span class="spk">A '+(i+1)+':</span>'+a+'<div class="S-db-opts">';
    [0,1,2,3,4].sort(()=>Math.random()-.5).forEach(function(j){html+='<div class="S-dopt" id="Sdo-'+i+'-'+j+'" onclick="S_selDopt('+i+','+j+')">'+S_DIALOG_B[j]+'</div>';});
    html+='</div></div>';
  });
  document.getElementById('S-dialog-body').innerHTML=html;
  document.getElementById('S-db').disabled=true;
  S_scr('dialog');
}
function S_selDopt(qi,oi){
  document.querySelectorAll('[id^="Sdo-'+qi+'-"]').forEach(e=>e.classList.remove('sel'));
  document.getElementById('Sdo-'+qi+'-'+oi).classList.add('sel');
  S_dialogAns[qi]=oi;
  if(Object.keys(S_dialogAns).length>=5)document.getElementById('S-db').disabled=false;
}
function S_submitDialog(){
  Sref('answers/dialog/'+S_name).set(S_dialogAns);
  var cor=0;
  Object.keys(S_dialogAns).forEach(function(qi){
    var oi=S_dialogAns[qi];
    var el=document.getElementById('Sdo-'+qi+'-'+oi);
    if(+oi===S_DIALOG_COR[+qi]){if(el)el.classList.add('ok');cor++;}else if(el)el.classList.add('no');
    var cel=document.getElementById('Sdo-'+qi+'-'+S_DIALOG_COR[+qi]);if(cel)cel.classList.add('ok');
  });
  document.getElementById('S-db').disabled=true;S_addPts(cor*2);S_scr('wait');
}
function S_revealDialog(){S_DIALOG_COR.forEach(function(j,i){var el=document.getElementById('Sdo-'+i+'-'+j);if(el)el.classList.add('ok');});}
function S_buildPaar(){
  S_paarSel=null;S_paarDone=0;S_paarData=S_PAAR.slice(0,8);
  var left=S_paarData.map((p,i)=>({t:p.fa,i,s:'fa'})).sort(()=>Math.random()-.5);
  var right=S_paarData.map((p,i)=>({t:p.de,i,s:'de'})).sort(()=>Math.random()-.5);
  var html='<div style="display:flex;flex-direction:column;gap:7px">';
  left.forEach(p=>html+='<div class="S-pi fa" id="Spfa-'+p.i+'" data-i="'+p.i+'" data-s="fa" onclick="S_selPaar(this)">'+p.t+'</div>');
  html+='</div><div style="display:flex;flex-direction:column;gap:7px">';
  right.forEach(p=>html+='<div class="S-pi" id="Spde-'+p.i+'" data-i="'+p.i+'" data-s="de" onclick="S_selPaar(this)">'+p.t+'</div>');
  html+='</div>';
  document.getElementById('S-psec').innerHTML=html;
  document.getElementById('S-pd').textContent='0';
  document.getElementById('S-pt').textContent=S_paarData.length;
  document.getElementById('S-pb').disabled=true;
  S_scr('paar');
}
function S_selPaar(el){
  if(el.classList.contains('mat'))return;
  if(!S_paarSel){el.classList.add('sel');S_paarSel=el;}
  else if(S_paarSel===el){el.classList.remove('sel');S_paarSel=null;}
  else if(S_paarSel.dataset.s===el.dataset.s){S_paarSel.classList.remove('sel');S_paarSel=el;el.classList.add('sel');}
  else{
    if(S_paarSel.dataset.i===el.dataset.i){
      [S_paarSel,el].forEach(x=>{x.classList.remove('sel');x.classList.add('mat');});
      S_paarSel=null;S_paarDone++;
      document.getElementById('S-pd').textContent=S_paarDone;
      if(S_paarDone>=S_paarData.length)document.getElementById('S-pb').disabled=false;
    }else{
      S_paarSel.classList.add('err');el.classList.add('err');
      var s=S_paarSel;S_paarSel=null;
      setTimeout(()=>{s.classList.remove('err','sel');el.classList.remove('err');},350);
    }
  }
}
function S_submitPaar(){
  Sref('answers/paar/'+S_name).set({score:S_paarDone,total:S_paarData.length});
  S_addPts(S_paarDone*2);
  document.getElementById('S-pb').disabled=true;
  document.getElementById('S-rv').textContent=S_pts;
  document.getElementById('S-re').textContent=S_pts>=30?'🏆':S_pts>=20?'🎉':'😊';
  S_scr('result');
}
function S_revealPaar(){S_paarData.forEach(function(p,i){var f=document.getElementById('Spfa-'+i);var d=document.getElementById('Spde-'+i);if(f&&!f.classList.contains('mat'))f.style.borderColor='#22C55E';if(d&&!d.classList.contains('mat'))d.style.borderColor='#22C55E';});}
function S_buildT3(){
  var task=S_TASKS['t3q'];S_mcAns={};
  var html='';
  task.questions.forEach(function(q,qi){
    html+='<div class="S-qc"><div class="S-qt">'+(qi+1)+'. '+q.q+'</div>';
    if(q.type==='free'){html+='<textarea class="S-fin-in" id="S-free-t3q-'+qi+'" placeholder="Persisch..."></textarea>';}
    else{html+='<div class="S-opts">';q.opts.forEach(function(o,oi){html+='<div class="S-opt'+(q.fa?' fa':'')+'" id="S-o-t3q-'+qi+'-'+oi+'" onclick="S_selT3Opt('+qi+','+oi+')">'+o+'</div>';});html+='</div>';}
    html+='</div>';
  });
  document.getElementById('S-t3-body').innerHTML=html;
  document.getElementById('S-t3b').disabled=false;S_scr('t3');
}
function S_selT3Opt(qi,oi){
  S_TASKS['t3q'].questions[qi].opts.forEach(function(_,i){var el=document.getElementById('S-o-t3q-'+qi+'-'+i);if(el)el.classList.remove('sel');});
  var el=document.getElementById('S-o-t3q-'+qi+'-'+oi);if(el)el.classList.add('sel');
  S_mcAns['q'+qi]=oi;
}
function S_submitT3(){
  S_TASKS['t3q'].questions.forEach(function(q,qi){if(q.type==='free'){var el=document.getElementById('S-free-t3q-'+qi);if(el)S_mcAns.free=el.value;}});
  Sref('answers/t3q/'+S_name).set(S_mcAns);
  var cor=0;
  S_TASKS['t3q'].questions.forEach(function(q,qi){
    if(q.type==='free')return;var ans=S_mcAns['q'+qi];if(ans===undefined)return;
    var cel=document.getElementById('S-o-t3q-'+qi+'-'+q.ans);var sel=document.getElementById('S-o-t3q-'+qi+'-'+ans);
    if(cel)cel.classList.add('ok','dis');if(sel&&ans!==q.ans)sel.classList.add('no');if(ans===q.ans)cor++;
  });
  document.getElementById('S-t3b').disabled=true;S_addPts(cor*2);S_scr('wait');
}
